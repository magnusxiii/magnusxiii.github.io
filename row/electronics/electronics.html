<html lang="el">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electronics Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --bg2: #0f1218;
    --bg3: #161b24;
    --bg4: #1c2330;
    --border: #2a3444;
    --border-bright: #3d5070;
    --accent: #00d4ff;
    --accent2: #0090cc;
    --accent-dim: rgba(0,212,255,0.12);
    --accent-glow: rgba(0,212,255,0.25);
    --green: #39d98a;
    --yellow: #f5c842;
    --red: #ff5f5f;
    --purple: #b07aff;
    --orange: #ff9f43;
    --text: #c8d6e8;
    --text-dim: #6b7f99;
    --text-bright: #e8f2ff;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Exo 2', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logo span { color: var(--text-dim); }
  .stats-bar {
    display: flex;
    gap: 20px;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-dim);
  }
  .stats-bar b { color: var(--accent); }

  /* ── TABS ── */
  .tabs-wrapper {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    gap: 2px;
    overflow-x: auto;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 14px 18px 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab-count {
    background: var(--bg4);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.68rem;
    padding: 1px 6px;
    border-radius: 10px;
  }
  .tab-btn.active .tab-count {
    background: var(--accent-dim);
    color: var(--accent);
  }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 16px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .search-box {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-box input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 8px 12px 8px 36px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent2); }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.82rem;
    padding: 8px 12px;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent2); }
  .btn {
    background: var(--accent-dim);
    border: 1px solid var(--accent2);
    border-radius: 6px;
    color: var(--accent);
    font-family: var(--sans);
    font-size: 0.82rem;
    font-weight: 600;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: var(--accent-glow); }
  .btn.green { background: rgba(57,217,138,0.1); border-color: var(--green); color: var(--green); }
  .btn.green:hover { background: rgba(57,217,138,0.2); }

  /* ── CONTENT ── */
  .content { padding: 20px 24px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── TABLE ── */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  thead {
    background: var(--bg3);
    border-bottom: 1px solid var(--border-bright);
  }
  th {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 12px 14px;
    text-align: left;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  th:hover { color: var(--accent); }
  th.sort-asc::after { content: ' ▲'; font-size: 0.6rem; color: var(--accent); }
  th.sort-desc::after { content: ' ▼'; font-size: 0.6rem; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg3); }
  tbody tr.editing { background: rgba(0,212,255,0.05); outline: 1px solid var(--accent2); }

  td {
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 0.82rem;
    vertical-align: middle;
  }
  td.name-cell {
    color: var(--text-bright);
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  td.box-cell {
    color: var(--yellow);
    font-size: 0.78rem;
  }
  td.type-cell { color: var(--purple); font-size: 0.78rem; }
  td.desc-cell {
    color: var(--text-dim);
    font-size: 0.78rem;
    font-family: var(--sans);
    max-width: 320px;
  }
  td.actions-cell { width: 90px; }

  /* type badges */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .badge-nmos  { background: rgba(0,212,255,0.12); color: var(--accent); border: 1px solid rgba(0,212,255,0.3); }
  .badge-pmos  { background: rgba(176,122,255,0.12); color: var(--purple); border: 1px solid rgba(176,122,255,0.3); }
  .badge-npn   { background: rgba(57,217,138,0.12); color: var(--green); border: 1px solid rgba(57,217,138,0.3); }
  .badge-pnp   { background: rgba(255,159,67,0.12); color: var(--orange); border: 1px solid rgba(255,159,67,0.3); }
  .badge-vreg  { background: rgba(245,200,66,0.12); color: var(--yellow); border: 1px solid rgba(245,200,66,0.3); }
  .badge-opamp { background: rgba(255,95,95,0.12); color: var(--red); border: 1px solid rgba(255,95,95,0.3); }
  .badge-gate  { background: rgba(0,144,204,0.12); color: #5bc8f5; border: 1px solid rgba(0,144,204,0.3); }
  .badge-driver { background: rgba(176,122,255,0.15); color: #d4a8ff; border: 1px solid rgba(176,122,255,0.3); }
  .badge-audio { background: rgba(255,159,67,0.15); color: #ffb866; border: 1px solid rgba(255,159,67,0.3); }
  .badge-scr   { background: rgba(255,95,95,0.15); color: var(--red); border: 1px solid rgba(255,95,95,0.3); }
  .badge-triac { background: rgba(255,95,95,0.15); color: #ff9090; border: 1px solid rgba(255,95,95,0.3); }
  .badge-opto  { background: rgba(57,217,138,0.1); color: #80e8b8; border: 1px solid rgba(57,217,138,0.25); }
  .badge-ic    { background: rgba(100,200,255,0.1); color: #8dd7f7; border: 1px solid rgba(100,200,255,0.25); }
  .badge-other { background: var(--bg4); color: var(--text-dim); border: 1px solid var(--border); }

  /* inline edit */
  .edit-input {
    background: var(--bg);
    border: 1px solid var(--accent2);
    border-radius: 4px;
    color: var(--text-bright);
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 4px 8px;
    width: 100%;
    outline: none;
  }
  .edit-input.desc { font-family: var(--sans); font-size: 0.78rem; }
  .edit-input.type-sel { font-size: 0.78rem; }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    font-size: 0.85rem;
    transition: background 0.15s;
    color: var(--text-dim);
  }
  .icon-btn:hover { background: var(--bg4); color: var(--text); }
  .icon-btn.save { color: var(--green); }
  .icon-btn.delete { color: var(--red); }
  .icon-btn.edit { color: var(--accent); }
  .icon-btn.cancel { color: var(--text-dim); }

  /* ── ADD ROW FORM ── */
  .add-row-form {
    display: none;
    background: var(--bg3);
    border: 1px solid var(--accent2);
    border-radius: 8px;
    padding: 16px 20px;
    margin-top: 16px;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .add-row-form.visible { display: flex; }
  .form-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 120px; }
  .form-field label { font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); font-family: var(--mono); }
  .form-field input, .form-field select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.82rem;
    padding: 7px 10px;
    outline: none;
  }
  .form-field input:focus, .form-field select:focus { border-color: var(--accent2); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

  /* ── RESULT COUNT ── */
  .result-info {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-dim);
    padding: 8px 0 12px;
  }
  .result-info b { color: var(--accent); }

  /* ── RESISTOR TABLE ── */
  .r-section-header {
    background: var(--bg3);
    border-bottom: 1px solid var(--border-bright);
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  td.r-value {
    color: var(--text-bright);
    font-family: var(--mono);
    font-weight: 600;
    font-size: 0.88rem;
    white-space: nowrap;
  }
  td.r-check {
    text-align: center;
    font-size: 1rem;
  }
  .r-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }
  .r-dot-smd {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }
  td.r-check.empty { color: var(--border-bright); }

  /* ── EXPORT / SAVE BUTTONS ── */
  .btn.export { background: rgba(57,217,138,0.08); border-color: var(--green); color: var(--green); }
  .btn.export:hover { background: rgba(57,217,138,0.18); }
  .btn.save-local { background: rgba(245,200,66,0.08); border-color: var(--yellow); color: var(--yellow); }
  .btn.save-local:hover { background: rgba(245,200,66,0.18); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
</style>
</head>

function normalize(s) {
  return (s || '').trim().toUpperCase().replace(/\s+/g,' ');
}

function lookupKB(name) {
  const n = normalize(name);
  for (const [k,v] of Object.entries(KB)) {
    if (normalize(k) === n) return v;
  }
  // partial match
  for (const [k,v] of Object.entries(KB)) {
    if (n.includes(normalize(k)) || normalize(k).includes(n)) return v;
  }
  return ['Other', ''];
}

function loadFromLS() {
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return null;
}
function loadEmbeddedData() {
  try {
    const el = document.getElementById('embedded-inventory');
    if (!el) return null;
    const raw = (el.textContent || '').trim();
    if (!raw || raw === 'null') return null;
    return JSON.parse(raw);
  } catch(e) {}
  return null;
}
function getBootData() {
  const embedded = loadEmbeddedData();
  if (embedded) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(embedded)); } catch(e) {}
    return embedded;
  }
  return loadFromLS();
}
async function saveToLS(options = {}) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state.data)); } catch(e) {}
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: state.data }),
    });
    if (!res.ok) {
      let msg = 'Απέτυχε η αποθήκευση στον server.';
      try {
        const payload = await res.json();
        if (payload?.error) msg = payload.error;
      } catch(e) {}
      throw new Error(msg);
    }
    return true;
  } catch (err) {
    console.error(err);
    if (!options.silent) alert(err?.message || 'Απέτυχε η αποθήκευση.');
    throw err;
  }
}

function mergeByName(savedArr = [], defaultArr = [], keyFn = item => normalize(item?.name || '')) {
  const merged = [...savedArr];
  const seen = new Set(savedArr.map(item => keyFn(item)));
  for (const item of defaultArr) {
    const key = keyFn(item);
    if (!key || seen.has(key)) continue;
    merged.push(item);
    seen.add(key);
  }
  return merged;
}

function mergeSavedWithDefaults(saved, defaults) {
  if (!saved) return defaults;
  return {
    ...defaults,
    ...saved,
    [TAB_IC]: mergeByName(saved[TAB_IC], defaults[TAB_IC]),
    [TAB_MOD]: mergeByName(saved[TAB_MOD], defaults[TAB_MOD]),
  };
}

function computeNextIdFromData(data) {
  let maxId = 0;
  Object.values(data || {}).forEach(rows => {
    (rows || []).forEach(row => {
      const id = Number(row?.id || 0);
      if (id > maxId) maxId = id;
    });
  });
  return maxId + 1;
}

async function initializeApp() {
  try {
    const res = await fetch(API_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('Δεν φορτώθηκαν τα αποθηκευμένα δεδομένα.');
    const payload = await res.json();
    if (payload?.data) {
      state.data = mergeSavedWithDefaults(payload.data, defaultData);
      try { localStorage.setItem(LS_KEY, JSON.stringify(state.data)); } catch(e) {}
    } else {
      await saveToLS({ silent: true });
    }
    nextId = computeNextIdFromData(state.data);
  } catch (err) {
    console.error(err);
  } finally {
    renderAll();
  }
}

// ─── RENDER ───
function getBoxes(tabId) {
  const boxes = [...new Set(state.data[tabId].map(r => r.box).filter(Boolean))].sort();
  return boxes;
}
function getTypes(tabId) {
  const types = [...new Set(state.data[tabId].map(r => r.type).filter(Boolean))].sort();
  return types;
}

function filtered(tabId) {
  let rows = state.data[tabId] || [];
  const q = state.search.toLowerCase();
  if (q) rows = rows.filter(r =>
    r.name.toLowerCase().includes(q) ||
    r.box.toLowerCase().includes(q) ||
    r.type.toLowerCase().includes(q) ||
    r.desc.toLowerCase().includes(q)
  );
  if (state.boxFilter) rows = rows.filter(r => r.box.toUpperCase() === state.boxFilter.toUpperCase());
  if (state.typeFilter) rows = rows.filter(r => r.type === state.typeFilter);
  rows = [...rows].sort((a,b) => {
    const av = (a[state.sortCol]||'').toLowerCase();
    const bv = (b[state.sortCol]||'').toLowerCase();
    return av < bv ? -state.sortDir : av > bv ? state.sortDir : 0;
  });
  return rows;
}

function renderAll() {
  renderTabs();
  renderFilters();
  renderContent();
  renderStats();
}

function renderStats() {
  const ic    = (state.data[TAB_IC]   ||[]).length;
  const res   = (state.data[TAB_RES]  ||[]).filter(r=>!r.isShunt).length;
  const pot   = (state.data[TAB_POT]  ||[]).length;
  const cap   = (state.data[TAB_CAP]  ||[]).length;
  const diode = (state.data[TAB_DIODE]||[]).filter(r=>r.kind==='diode').length;
  const zener = (state.data[TAB_DIODE]||[]).filter(r=>r.kind==='zener').length;
  const mod   = (state.data[TAB_MOD]  ||[]).length;
  document.getElementById('globalStats').innerHTML =
    `<span>ICs:<b>${ic}</b></span><span>R:<b>${res}</b></span><span>Pot:<b>${pot}</b></span><span>C:<b>${cap}</b></span><span>D:<b>${diode}</b></span><span>Z:<b>${zener}</b></span><span>Mod:<b>${mod}</b></span>`;
}

function renderTabs() {
  const wrap = document.getElementById('tabsWrapper');
  wrap.innerHTML = TABS.map(t => {
    const count = state.data[t.id].length;
    const active = state.activeTab === t.id ? 'active' : '';
    return `<button class="tab-btn ${active}" onclick="switchTab('${t.id}')">
      ${t.icon} ${t.label} <span class="tab-count">${count}</span>
    </button>`;
  }).join('');
}

function renderFilters() {
  const tab = state.activeTab;

  const typeSel = document.getElementById('typeFilter');

  boxSel.innerHTML = '<option value="">Όλα τα κουτιά</option>' +
    boxes.map(b => `<option value="${b}" ${state.boxFilter===b?'selected':''}>${b}</option>`).join('');

function cdot(active, color, title) {
  if (!active) return `<span style="color:var(--border)">·</span>`;
  const c = color || 'var(--green)';
  return `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c};box-shadow:0 0 5px ${c}" title="${title||''}"></span>`;
}

function fmtCap(value, unit) {
  // Format display: e.g. 1.7 nano → "1,7 nF"
  const unitMap = { pico:'pF', nano:'nF', micro:'μF' };
  const v = String(value).replace('.',',');
  return `${v} ${unitMap[unit]||unit}`;
}

  'Fast Rec.': 'badge-driver',
  'Zener':     'badge-pmos',
  'TVS':       'badge-audio',
  'DIAC':      'badge-scr',
  'Bridge':    'badge-opto',
  'Other':     'badge-other',
};

function renderDiodes() {
  const content = document.getElementById('mainContent');
  const q = state.search.toLowerCase();
  const all = state.data[TAB_DIODE] || [];
  const diodes = all.filter(r => r.kind === 'diode');
  const zeners = all.filter(r => r.kind === 'zener');

  const fq = r => !q || JSON.stringify(r).toLowerCase().includes(q);
  const fd = diodes.filter(fq);
  const fz = zeners.filter(fq);

  let html = `<div class="result-info"><b>${fd.length}</b> δίοδοι + <b>${fz.length}</b> zener</div>`;

  // Add form
  html += `<div class="add-row-form" id="addForm">
    <div class="form-field"><label>Όνομα</label><input id="af-name" placeholder="π.χ. 1N4007"></div>
    <div class="form-field"><label>Κουτί</label><input id="af-box" placeholder="π.χ. DS"></div>
    <div class="form-field"><label>Τύπος</label><select id="af-dtype">
      ${Object.keys(DTYPE_BADGE).map(t=>`<option>${t}</option>`).join('')}
    </select></div>
    <div class="form-field" style="flex:2"><label>Περιγραφή</label><input id="af-desc" placeholder="Σύντομη περιγραφή..."></div>
    <button class="btn green" onclick="saveNewDiode()" style="align-self:flex-end">✓ Αποθήκευση</button>
    <button class="btn" onclick="toggleAddForm()" style="align-self:flex-end;border-color:var(--border);color:var(--text-dim)">✕</button>
  </div>`;

  // Diodes table
  if (fd.length) {
    html += `<div class="table-wrap" style="margin-bottom:20px"><table>
      <thead>
        <tr><td colspan="5" class="r-section-header">── ΔΙΟΔΟΙ (${fd.length})</td></tr>
        <tr>
          <th onclick="sortBy('name')" class="${sortClass('name')}">Όνομα</th>
          <th onclick="sortBy('box')" class="${sortClass('box')}">Κουτί</th>
          <th>Τύπος</th>
          <th>Περιγραφή</th>
          <th style="width:80px">Ενέργειες</th>
        </tr>
      </thead><tbody>`;
    fd.forEach(r => {
      const ed = state.editingId === r.id;
      if (ed) {
        html += `<tr class="editing" id="row-${r.id}">
          <td><input class="edit-input" id="e-dname-${r.id}" value="${esc(r.name)}"></td>
          <td><input class="edit-input" id="e-dbox-${r.id}" value="${esc(r.box)}" style="width:60px"></td>
          <td><select class="edit-input" id="e-dtype-${r.id}">${Object.keys(DTYPE_BADGE).map(t=>`<option ${r.dtype===t?'selected':''}>${t}</option>`).join('')}</select></td>
          <td><input class="edit-input desc" id="e-ddesc-${r.id}" value="${esc(r.ddesc)}"></td>
          <td><button class="icon-btn save" onclick="saveDiodeEdit(${r.id})">✓</button>
              <button class="icon-btn cancel" onclick="cancelEdit()">✕</button></td>
        </tr>`;
      } else {
        const bc = DTYPE_BADGE[r.dtype] || 'badge-other';
        html += `<tr id="row-${r.id}">
          <td class="name-cell">${esc(r.name)}</td>
          <td class="box-cell">${esc(r.box)}</td>
          <td><span class="badge ${bc}">${esc(r.dtype)}</span></td>
          <td class="desc-cell">${esc(r.ddesc)||'<span style="color:var(--border-bright)">—</span>'}</td>
          <td class="actions-cell">
            <button class="icon-btn edit" onclick="startEdit(${r.id})">✎</button>
            <button class="icon-btn delete" onclick="deleteRow(${r.id})">✕</button>
          </td>
        </tr>`;
      }
    });
    html += `</tbody></table></div>`;
  }

  // Zener table
  if (fz.length) {
    html += `<div class="table-wrap"><table>
      <thead>
        <tr><td colspan="5" class="r-section-header">── ZENER DIODES (${fz.length})</td></tr>
        <tr>
          <th>Όνομα</th>
          <th style="text-align:center;width:80px">Volt</th>
          <th style="text-align:center;width:80px">Watt</th>
          <th style="text-align:center;width:80px">SMD</th>
          <th style="width:80px">Ενέργειες</th>
        </tr>
      </thead><tbody>`;
    fz.forEach(r => {
      html += `<tr id="row-${r.id}">
        <td class="name-cell">${esc(r.name)}</td>
        <td style="text-align:center;color:var(--yellow);font-family:var(--mono)">${r.volts}V</td>
        <td style="text-align:center;color:var(--text-dim);font-family:var(--mono)">${r.watts}W</td>
        <td class="r-check">${r.smd ? `<span class="r-dot r-dot-smd"></span>` : `<span style="color:var(--border)">·</span>`}</td>
        <td class="actions-cell">
          <button class="icon-btn delete" onclick="deleteRow(${r.id})">✕</button>
        </td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  if (!fd.length && !fz.length) {
    html += `<div class="empty-state"><div class="icon">🔍</div>Δεν βρέθηκαν αποτελέσματα.</div>`;
  }
  content.innerHTML = html;
}

async function saveDiodeEdit(id) {
  const row = (state.data[TAB_DIODE]||[]).find(r => r.id === id);
  if (!row) return;
  row.name  = document.getElementById(`e-dname-${id}`)?.value.trim() || row.name;
  row.box   = (document.getElementById(`e-dbox-${id}`)?.value.trim() || row.box).toUpperCase();
  row.dtype = document.getElementById(`e-dtype-${id}`)?.value || row.dtype;
  row.ddesc = document.getElementById(`e-ddesc-${id}`)?.value.trim() || '';
  state.editingId = null;
  await saveToLS(); renderAll();
}
async function saveNewDiode() {
  const name  = document.getElementById('af-name')?.value.trim();
  const box   = document.getElementById('af-box')?.value.trim().toUpperCase();
  const dtype = document.getElementById('af-dtype')?.value || 'Other';
  const ddesc = document.getElementById('af-desc')?.value.trim() || '';
  if (!name || !box) { alert('Συμπλήρωσε Όνομα και Κουτί'); return; }
  state.data[TAB_DIODE].push({ id: nextId++, name, box, dtype, ddesc, kind:'diode' });
  document.getElementById('addForm').classList.remove('visible');
  await saveToLS(); renderAll();
}

// ─── SPARE PARTS RENDER ───
function renderSpare() {
  const content = document.getElementById('mainContent');
  const q = state.search.toLowerCase();
  const all = state.data[TAB_SPARE] || [];
  const rows = q ? all.filter(r => JSON.stringify(r).toLowerCase().includes(q)) : all;

  let html = `<div class="result-info"><b>${rows.length}</b> spare parts</div>`;

  html += `<div class="add-row-form" id="addForm">
    <div class="form-field"><label>Θέση</label><input id="af-pos" placeholder="π.χ. 29"></div>
    <div class="form-field"><label>Όνομα</label><input id="af-name" placeholder="π.χ. IRF540N"></div>
    <div class="form-field" style="flex:2"><label>Περιγραφή</label><input id="af-desc" placeholder="Σύντομη περιγραφή..."></div>
    <button class="btn green" onclick="saveNewSpare()" style="align-self:flex-end">✓ Αποθήκευση</button>
    <button class="btn" onclick="toggleAddForm()" style="align-self:flex-end;border-color:var(--border);color:var(--text-dim)">✕</button>
  </div>`;

  if (!rows.length) {
    html += `<div class="empty-state"><div class="icon">🔍</div>Δεν βρέθηκαν αποτελέσματα.</div>`;
    content.innerHTML = html; return;
  }

  html += `<div class="table-wrap"><table>
    <thead><tr>
      <th style="width:70px">Θέση</th>
      <th onclick="sortBy('name')" class="${sortClass('name')}">Component</th>
      <th>Περιγραφή</th>
      <th style="width:80px">Ενέργειες</th>
    </tr></thead><tbody>`;

  rows.forEach(r => {
    const ed = state.editingId === r.id;
    if (ed) {
      html += `<tr class="editing" id="row-${r.id}">
        <td><input class="edit-input" id="e-spos-${r.id}" value="${esc(r.pos)}" style="width:50px"></td>
        <td><input class="edit-input" id="e-sname-${r.id}" value="${esc(r.name)}"></td>
        <td><input class="edit-input desc" id="e-sdesc-${r.id}" value="${esc(r.desc)}"></td>
        <td><button class="icon-btn save" onclick="saveSpareEdit(${r.id})">✓</button>
            <button class="icon-btn cancel" onclick="cancelEdit()">✕</button></td>
      </tr>`;
    } else {
      html += `<tr id="row-${r.id}">
        <td style="text-align:center;color:var(--yellow);font-family:var(--mono);font-weight:700">${esc(r.pos)}</td>
        <td class="name-cell">${esc(r.name)}</td>
        <td class="desc-cell">${esc(r.desc)||'<span style="color:var(--border-bright)">—</span>'}</td>
        <td class="actions-cell">
          <button class="icon-btn edit" onclick="startEdit(${r.id})">✎</button>
          <button class="icon-btn delete" onclick="deleteRow(${r.id})">✕</button>
        </td>
      </tr>`;
    }
  });
  html += `</tbody></table></div>`;
  content.innerHTML = html;
}
async function saveSpareEdit(id) {
  const row = (state.data[TAB_SPARE]||[]).find(r => r.id === id);
  if (!row) return;
  row.pos  = document.getElementById(`e-spos-${id}`)?.value.trim()  || row.pos;
  row.name = document.getElementById(`e-sname-${id}`)?.value.trim() || row.name;
  row.desc = document.getElementById(`e-sdesc-${id}`)?.value.trim() || '';
  state.editingId = null;
  await saveToLS(); renderAll();
}
async function saveNewSpare() {
  const pos  = document.getElementById('af-pos')?.value.trim();
  const name = document.getElementById('af-name')?.value.trim();
  const desc = document.getElementById('af-desc')?.value.trim() || '';
  if (!name) { alert('Βάλε όνομα component'); return; }
  state.data[TAB_SPARE].push({ id: nextId++, pos: pos||'?', name, desc, kind:'spare' });
  document.getElementById('addForm').classList.remove('visible');
  await saveToLS(); renderAll();
}
function sortClass(col) {
  if (state.sortCol !== col) return '';
  return state.sortDir === 1 ? 'sort-asc' : 'sort-desc';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── ACTIONS ───
function switchTab(id) {
  state.activeTab = id;
  state.editingId = null;
  state.boxFilter = '';
  state.typeFilter = '';
  renderAll();
}
function sortBy(col) {
  if (state.sortCol === col) state.sortDir *= -1;
  else { state.sortCol = col; state.sortDir = 1; }
  renderContent();
}
function toggleAddForm() {
  const f = document.getElementById('addForm');
  f.classList.toggle('visible');
  if (f.classList.contains('visible')) document.getElementById('af-name')?.focus();
}
async function saveNewRow() {
  const name = document.getElementById('af-name')?.value.trim();
  const box = document.getElementById('af-box')?.value.trim().toUpperCase();
  const type = document.getElementById('af-type')?.value || 'Other';
  const desc = document.getElementById('af-desc')?.value.trim() || '';
  if (!name || !box) { alert('Συμπλήρωσε τουλάχιστον Όνομα και Κουτί'); return; }
  state.data[state.activeTab].push({ id: nextId++, name, box, type, desc });
  document.getElementById('addForm').classList.remove('visible');
  await saveToLS();
  renderAll();
}
function startEdit(id) {
  state.editingId = id;
  renderContent();
  document.getElementById(`e-name-${id}`)?.focus();
}
function cancelEdit() {
  state.editingId = null;
  renderContent();
}
async function saveEdit(id) {
  const row = state.data[state.activeTab].find(r => r.id === id);
  if (!row) return;
  row.name = document.getElementById(`e-name-${id}`)?.value.trim() || row.name;
  row.box  = (document.getElementById(`e-box-${id}`)?.value.trim() || row.box).toUpperCase();
  row.type = document.getElementById(`e-type-${id}`)?.value || row.type;
  row.desc = document.getElementById(`e-desc-${id}`)?.value.trim() || row.desc;
  state.editingId = null;
  await saveToLS();
  renderAll();
}
async function deleteRow(id) {
  if (!confirm('Διαγραφή;')) return;
  const tab = state.activeTab;
  state.data[tab] = state.data[tab].filter(r => r.id !== id);
  await saveToLS();
  renderAll();
}
async function saveNewResistor() {
  const value = document.getElementById('af-name')?.value.trim();
  const w025  = document.getElementById('af-w025')?.value.trim();
  const w1    = document.getElementById('af-w1')?.value.trim();
  const w2    = document.getElementById('af-w2')?.value.trim();
  const smd   = document.getElementById('af-smd')?.value === '1';
  if (!value) { alert('Βάλε τιμή αντίστασης'); return; }
  state.data[TAB_RES].push({ id: nextId++, value, w025, w1, w2, smd, isShunt: false });
  document.getElementById('addForm').classList.remove('visible');
  await saveToLS();
  renderAll();
}
async function saveResEdit(id) {
  const row = state.data[TAB_RES].find(r => r.id === id);
  if (!row) return;
  row.value = document.getElementById(`e-val-${id}`)?.value.trim() || row.value;
  row.w025  = document.getElementById(`e-w025-${id}`)?.value.trim();
  row.w1    = document.getElementById(`e-w1-${id}`)?.value.trim();
  row.w2    = document.getElementById(`e-w2-${id}`)?.value.trim();
  row.smd   = document.getElementById(`e-smd-${id}`)?.value === '1';
  state.editingId = null;
  await saveToLS();
  renderAll();
}

// ─── EXCEL EXPORT ───
async function exportToExcel() {
  await saveToLS();
  window.location.href = EXPORT_URL;
  return;
  const wb = XLSX.utils.book_new();

  // Sheet 1: ICs
  const icRows = [['Όνομα','Κουτί','Τύπος','Περιγραφή']];
  (state.data[TAB_IC]||[]).forEach(r => icRows.push([r.name, r.box, r.type, r.desc]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(icRows), 'ICs & Transistors');

  // Sheet 2: Resistors
  const resRows = [['Τιμή','1/4W','1W','2W-3W','SMD','Shunt R']];
  (state.data[TAB_RES]||[]).forEach(r => resRows.push([
    r.value, r.w025||'', r.w1||'', r.w2||'', r.smd?'✔':'', r.isShunt?r.rval:''
  ]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(resRows), 'Αντιστάσεις');

  // Sheet 3: Potentiometers & Trimmers
  const potRows = [['Τύπος','Τιμή','Wattage','Σημείωση']];
  (state.data[TAB_POT]||[]).forEach(r =>
    potRows.push([r.kind==='pot'?'Potentiometer':'Trimmer', r.value, r.watt||'', r.note||'']));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(potRows), 'Ποτενσιόμετρα');

  // Sheet 4: Capacitors
  const capRows = [['Τιμή','Μονάδα','Low V','Mid V','High V','SMD','kV']];
  (state.data[TAB_CAP]||[]).forEach(r =>
    capRows.push([fmtCap(r.value,r.unit), r.unit,
      r.lowV?'✔':'', r.midV?'✔':'', r.highV?'✔':'', r.smd?'✔':'', r.kV?'✔':'']));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(capRows), 'Πυκνωτές');

  // Sheet 4: Diodes
  const diodeRows = [['Όνομα','Κουτί','Τύπος','Περιγραφή']];
  (state.data[TAB_DIODE]||[]).filter(r=>r.kind==='diode').forEach(r =>
    diodeRows.push([r.name, r.box, r.dtype, r.ddesc]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(diodeRows), 'Δίοδοι');

  // Sheet 5: Zener
  const zenerRows = [['Όνομα','Volt','Watt','SMD']];
  (state.data[TAB_DIODE]||[]).filter(r=>r.kind==='zener').forEach(r =>
    zenerRows.push([r.name, r.volts+'V', r.watts+'W', r.smd?'✔':'']));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(zenerRows), 'Zener');

  // Sheet 6: Spare Parts
  const spareRows = [['Θέση','Component','Περιγραφή']];
  (state.data[TAB_SPARE]||[]).forEach(r =>
    spareRows.push([r.pos, r.name, r.desc]));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(spareRows), 'Spare Parts');

  // Sheet 8: Modules
  const modRows = [['Όνομα','Κατηγορία','Περιγραφή']];
  (state.data[TAB_MOD]||[]).forEach(r => modRows.push([r.name, r.cat, r.desc]));
  if (modRows.length > 1) XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(modRows), 'Modules');

  XLSX.writeFile(wb, 'electronics_inventory.xlsx');
}

});

renderAll();
