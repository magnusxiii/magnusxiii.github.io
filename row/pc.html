<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400, initial-scale=0.25, maximum-scale=5.0">

<title>PC Mode Loader</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
}

#topbar{
    height:50px;
    background:#1b1b1b;
    color:white;
    display:flex;
    align-items:center;
    padding:0 15px;
    font-family:Arial;
    font-size:14px;
    border-bottom:1px solid #333;
}

#browser{
    width:1400px;
    height:calc(100vh - 50px);
    border:none;

    /* Desktop scale for mobile */
    zoom:0.35;

    transform-origin: top left;
    background:white;
}

#container{
    width:100%;
    height:calc(100vh - 50px);
    overflow:auto;
}
</style>
</head>

<body>

<div id="topbar">
    🖥 Desktop PC Mode Preview
</div>

<div id="container">
    <iframe
        id="browser"
        src="https://xarkor.com/metallica/index.html">
    </iframe>
</div>

<script>

/* Fake desktop properties */
try {

Object.defineProperty(navigator, 'userAgent', {
    get: function () {
        return 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/137.0.0.0 Safari/537.36';
    }
});

Object.defineProperty(screen, 'width', {
    get: function () {
        return 1920;
    }
});

Object.defineProperty(screen, 'height', {
    get: function () {
        return 1080;
    }
});

} catch(e) {
    console.log(e);
}

</script>

</body>
</html>
