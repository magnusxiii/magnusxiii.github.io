<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courier Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }
    input, select, button {
      padding: 10px;
      margin: 8px 0;
      width: 100%;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Courier Tracker</h1>

  <label for="courier">Courier</label>
  <select id="courier">
    <option value="boxnow">BOX NOW</option>
    <option value="elta">ELTA</option>
    <option value="acs">ACS</option>
    <option value="speedex">Speedex</option>
    <option value="geniki">Geniki</option>
    <option value="intex">Intex</option>
  </select>

  <label for="trackingNumber">Tracking Number</label>
  <input id="trackingNumber" type="text" placeholder="Βάλε κωδικό αποστολής" />

  <button onclick="trackParcel()">Αναζήτηση</button>

  <div id="result">Περιμένω αναζήτηση...</div>

  <script>
    async function trackParcel() {
      const courier = document.getElementById("courier").value;
      const code = document.getElementById("trackingNumber").value.trim();
      const resultBox = document.getElementById("result");

      if (!code) {
        resultBox.innerHTML = "Βάλε κωδικό αποστολής.";
        return;
      }

      resultBox.innerHTML = "Αναζήτηση...";

      try {
        const res = await fetch("https://xiii.tristaniaa2.workers.dev/track", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            courier: courier,
            code: code
          })
        });

        const data = await res.json();

        if (!res.ok) {
          resultBox.innerHTML = `Σφάλμα: ${data.error || "Άγνωστο σφάλμα"}`;
          return;
        }

        resultBox.innerHTML = `
Courier: ${data.courier || courier}
Tracking: ${data.trackingNumber || code}
Status: ${data.status || "-"}
Last Update: ${data.lastUpdate || "-"}
Raw Response:
${JSON.stringify(data, null, 2)}
        `;
      } catch (err) {
        resultBox.innerHTML = `Σφάλμα: ${err.message}`;
      }
    }
  </script>
</body>
</html>
