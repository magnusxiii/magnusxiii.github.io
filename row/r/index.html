<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek Courier Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0a0c10;--bg2:#181c26;--bg3:#1e2230;--brd:#2a2f3e;--t:#e8ecf4;--t2:#8892a6;--t3:#565e72;--ac:#e8a838;--acd:#c4872a;--gl:rgba(232,168,56,.15);--ok:#34d399;--inf:#60a5fa;--wrn:#fbbf24;--err:#f87171;--acs:#ff6b35;--elta:#2196f3}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column;align-items:center}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(232,168,56,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,168,56,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
        .c{position:relative;z-index:1;width:100%;max-width:820px;padding:40px 20px}
        .hdr{text-align:center;margin-bottom:36px}
        .hdr .ico{display:inline-flex;width:48px;height:48px;background:var(--ac);border-radius:12px;align-items:center;justify-content:center;font:700 20px 'JetBrains Mono',monospace;color:var(--bg);box-shadow:0 0 24px var(--gl);margin-bottom:16px}
        .hdr h1{font-size:28px;font-weight:700;letter-spacing:-.5px}.hdr h1 b{color:var(--ac)}
        .hdr .sub{color:var(--t2);font-size:14px;margin-top:6px}
        .hdr .live{display:inline-block;width:8px;height:8px;background:var(--ok);border-radius:50%;box-shadow:0 0 8px var(--ok);margin-right:6px;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

        .card{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:24px;margin-bottom:20px}
        label{display:block;font:600 11px/1 'JetBrains Mono',monospace;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}

        /* Courier selector */
        .courier-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
        .courier-btn{flex:1;min-width:100px;background:var(--bg3);border:1.5px solid var(--brd);border-radius:8px;padding:10px 12px;color:var(--t2);font:600 12px 'JetBrains Mono',monospace;cursor:pointer;transition:.2s;text-align:center}
        .courier-btn:hover{border-color:var(--t2);color:var(--t)}
        .courier-btn.active{border-color:var(--ac);color:var(--ac);background:var(--gl)}
        .courier-btn .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px}
        .dot-elta{background:var(--elta)}.dot-acs{background:var(--acs)}.dot-auto{background:var(--ac)}

        .row{display:flex;gap:10px}
        textarea{flex:1;background:var(--bg3);border:1.5px solid var(--brd);border-radius:8px;padding:14px 16px;color:var(--t);font:15px 'JetBrains Mono',monospace;resize:vertical;min-height:50px;max-height:150px;outline:none;transition:.2s}
        textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--gl)}
        textarea::placeholder{color:var(--t3);font-size:13px}
        .btn{background:var(--ac);color:var(--bg);border:none;border-radius:8px;padding:14px 28px;font:700 14px 'Manrope',sans-serif;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:.2s;white-space:nowrap;display:flex;align-items:center;gap:8px}
        .btn:hover{background:var(--acd);transform:translateY(-1px);box-shadow:0 4px 16px var(--gl)}
        .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
        .btn svg{width:18px;height:18px}
        .hint{margin-top:10px;font:12px 'JetBrains Mono',monospace;color:var(--t3)}

        .spin-wrap{display:none;text-align:center;padding:36px}.spin-wrap.on{display:block}
        .spin{width:36px;height:36px;border:3px solid var(--brd);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 14px}
        @keyframes sp{to{transform:rotate(360deg)}}.spin-wrap p{color:var(--t2);font-size:14px}

        #out{display:flex;flex-direction:column;gap:18px}
        .res{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;overflow:hidden;animation:up .3s ease-out}
        @keyframes up{from{opacity:0;transform:translateY(10px)}}
        .res-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--brd);flex-wrap:wrap;gap:8px}
        .res-hd.elta-hd{background:rgba(33,150,243,.06)}.res-hd.acs-hd{background:rgba(255,107,53,.06)}
        .res-hd .tn{font:600 15px 'JetBrains Mono',monospace;color:var(--ac)}
        .res-hd .courier-tag{font:700 10px 'JetBrains Mono',monospace;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
        .tag-elta{background:rgba(33,150,243,.15);color:var(--elta)}.tag-acs{background:rgba(255,107,53,.15);color:var(--acs)}
        .badge{font:600 11px 'JetBrains Mono',monospace;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
        .b-transit{background:rgba(96,165,250,.15);color:var(--inf)}.b-ok{background:rgba(52,211,153,.15);color:var(--ok)}.b-new{background:rgba(251,191,36,.15);color:var(--wrn)}.b-err{background:rgba(248,113,113,.15);color:var(--err)}

        table{width:100%;border-collapse:collapse}
        th{text-align:left;padding:10px 20px;font:600 11px 'JetBrains Mono',monospace;color:var(--t3);text-transform:uppercase;letter-spacing:1px;background:rgba(0,0,0,.15);border-bottom:1px solid var(--brd)}
        td{padding:12px 20px;font-size:13px;color:var(--t2);border-bottom:1px solid rgba(42,47,62,.4)}
        tr:last-child td{border-bottom:none}
        tbody tr:first-child td{color:var(--t);font-weight:600}
        td:first-child{color:var(--t);font-weight:500}
        td:nth-child(2),td:nth-child(3){font:12px 'JetBrains Mono',monospace;white-space:nowrap}
        td:nth-child(4){font-size:12px;color:var(--t3)}
        .err-msg{padding:20px;text-align:center;font-size:14px;line-height:1.6;color:var(--err)}

        .hist{margin-top:18px}.hist h3{font:600 11px 'JetBrains Mono',monospace;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
        .chips{display:flex;flex-wrap:wrap;gap:6px}
        .chip{background:var(--bg3);border:1px solid var(--brd);border-radius:6px;padding:5px 12px;font:12px 'JetBrains Mono',monospace;color:var(--t2);cursor:pointer;transition:.15s}
        .chip:hover{border-color:var(--ac);color:var(--ac)}
        .clr{background:0;border:0;color:var(--t3);font:11px 'JetBrains Mono',monospace;cursor:pointer;margin-left:8px}.clr:hover{color:var(--err)}
        .ft{text-align:center;margin-top:36px;font:11px 'JetBrains Mono',monospace;color:var(--t3)}.ft a{color:var(--ac);text-decoration:none}
        @media(max-width:600px){.c{padding:20px 12px}.card{padding:18px}.row{flex-direction:column}.btn{width:100%;justify-content:center}.hdr h1{font-size:22px}th,td{padding:9px 12px}.courier-row{flex-direction:column}}
    </style>
</head>
<body>
<div class="c">
    <div class="hdr">
        <div class="ico">GR</div>
        <h1>Greek <b>Courier</b> Tracker</h1>
        <p class="sub" id="status"><span class="live"></span>Σύνδεση...</p>
    </div>

    <div class="card">
        <!-- Courier selector -->
        <label>Courier</label>
        <div class="courier-row">
            <button class="courier-btn active" onclick="setCourier('auto')" id="c-auto">
                <span class="dot dot-auto"></span>Auto-detect
            </button>
            <button class="courier-btn" onclick="setCourier('elta')" id="c-elta">
                <span class="dot dot-elta"></span>ΕΛΤΑ
            </button>
            <button class="courier-btn" onclick="setCourier('acs')" id="c-acs">
                <span class="dot dot-acs"></span>ACS
            </button>
        </div>

        <label>Tracking Number</label>
        <div class="row">
            <textarea id="inp" placeholder="π.χ. SE102285731GR ή 2408613631&#10;Πολλαπλά χωρισμένα με Enter..." rows="2"></textarea>
            <button class="btn" onclick="go()" id="btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                ΑΝΑΖΗΤΗΣΗ
            </button>
        </div>
        <div class="hint" id="hintTxt">Auto-detect: ΕΛΤΑ (XX000000000XX) · ACS (10ψήφιο)</div>
    </div>

    <div class="spin-wrap" id="spin"><div class="spin"></div><p id="spinTxt">Αναζήτηση...</p></div>
    <div id="out"></div>

    <div class="hist" id="histSec" style="display:none">
        <h3>Πρόσφατα <button class="clr" onclick="clrH()">[X]</button></h3>
        <div class="chips" id="chips"></div>
    </div>
    <div class="ft">ΕΛΤΑ · ACS · <a href="https://github.com" target="_blank">More coming soon</a></div>
</div>

<script>
const WORKER = 'https://xiii.tristaniaa2.workers.dev';
let selectedCourier = 'auto';
let hist = [];
try { const s = localStorage.getItem('gct_h'); if (s) hist = JSON.parse(s); } catch(e) {}
showH();

function setCourier(c) {
    selectedCourier = c;
    document.querySelectorAll('.courier-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('c-' + c).classList.add('active');
}

// Auto-detect courier from tracking number
function detectCourier(num) {
    if (selectedCourier !== 'auto') return selectedCourier;
    // ELTA: 2 letters + 9 digits + 2 letters (e.g. SE102285731GR)
    if (/^[A-Za-z]{2}\d{9}[A-Za-z]{2}$/.test(num)) return 'elta';
    // ACS: 10 digits
    if (/^\d{10}$/.test(num)) return 'acs';
    // Default: try both
    return 'elta';
}

// Probe
(async function() {
    const el = document.getElementById('status');
    try {
        const c = new AbortController();
        setTimeout(() => c.abort(), 6000);
        const r = await fetch(WORKER + '/elta', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'number=TEST&s=0',
            signal: c.signal
        });
        const t = await r.text();
        if (t.includes('"status"')) {
            el.innerHTML = '<span class="live"></span>Online — ΕΛΤΑ + ACS';
        } else {
            el.innerHTML = '<span class="live"></span>Online';
        }
    } catch(e) {
        el.innerHTML = '⚠ Offline';
        el.style.color = 'var(--err)';
    }
})();

async function go() {
    const raw = document.getElementById('inp').value.trim();
    if (!raw) { document.getElementById('inp').focus(); return; }
    const nums = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
    if (!nums.length) return;

    nums.forEach(n => { hist = hist.filter(h => h !== n); hist.unshift(n); });
    if (hist.length > 20) hist.length = 20;
    try { localStorage.setItem('gct_h', JSON.stringify(hist)); } catch(e) {}
    showH();

    const out = document.getElementById('out');
    out.innerHTML = '';
    document.getElementById('spin').classList.add('on');
    document.getElementById('btn').disabled = true;

    for (const num of nums) {
        const courier = detectCourier(num);
        document.getElementById('spinTxt').textContent = `[${courier.toUpperCase()}] ${num}...`;

        try {
            if (courier === 'acs') {
                await trackACS(num, out);
            } else {
                await trackElta(num, out);
            }
        } catch(e) {
            errC(num, courier, 'Σφάλμα: ' + e.message, out);
        }
    }

    document.getElementById('spin').classList.remove('on');
    document.getElementById('btn').disabled = false;
}

// ═══ ΕΛΤΑ ═══
async function trackElta(num, out) {
    const r = await fetch(WORKER + '/elta', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
        body: 'number=' + encodeURIComponent(num) + '&s=0'
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const json = await r.json();

    if (!json || json.status !== 1 || !json.result) { errC(num, 'elta', 'Δεν βρέθηκαν αποτελέσματα', out); return; }
    const keys = Object.keys(json.result);
    for (const tn of keys) {
        const entry = json.result[tn];
        if (!entry || entry.status !== 1 || !entry.result || !entry.result.length) {
            errC(tn, 'elta', 'Δεν βρέθηκε', out); continue;
        }
        const evts = entry.result;
        const lat = evts[0].status.toLowerCase();
        let bc = 'b-new', bt = 'ΝΕΟ';
        if (lat.includes('παραδ') || lat.includes('deliver')) { bc='b-ok'; bt='ΠΑΡΑΔΟΘΗΚΕ'; }
        else if (lat.includes('επιστρ')) { bc='b-err'; bt='ΕΠΙΣΤΡΟΦΗ'; }
        else if (lat.includes('μεταφορ')||lat.includes('αναχ')||lat.includes('άφιξη')||lat.includes('διανομ')||lat.includes('φόρτωση')||lat.includes('αποστολ')||lat.includes('εξερχ')) { bc='b-transit'; bt='ΣΕ ΜΕΤΑΦΟΡΑ'; }
        else if (lat.includes('δημιουργ')||lat.includes('παραλαβ')) { bc='b-new'; bt='ΔΗΜΙΟΥΡΓΗΘΗΚΕ'; }
        else { bc='b-transit'; bt='ΣΕ ΕΞΕΛΙΞΗ'; }

        addCard(tn, 'elta', bt, bc, evts.map(v => ({
            status: v.status, date: v.date, time: v.time, place: v.place
        })), out);
    }
}

// ═══ ACS ═══
async function trackACS(num, out) {
    const r = await fetch(WORKER + '/acs/' + encodeURIComponent(num));
    if (!r.ok) {
        if (r.status === 406) {
            errC(num, 'acs', 'ACS API χρειάζεται session key — δοκίμασε στο acscourier.net', out);
            return;
        }
        throw new Error('HTTP ' + r.status);
    }
    const json = await r.json();

    if (!json || !json.items || !json.items.length) {
        errC(num, 'acs', 'Δεν βρέθηκε η αποστολή', out); return;
    }

    const item = json.items[0];
    const delivered = item.isDelivered;
    const returned = item.isReturned;

    let bc = 'b-transit', bt = 'ΣΕ ΕΞΕΛΙΞΗ';
    if (delivered) { bc = 'b-ok'; bt = 'ΠΑΡΑΔΟΘΗΚΕ'; }
    else if (returned) { bc = 'b-err'; bt = 'ΕΠΙΣΤΡΟΦΗ'; }

    // Parse statusHistory
    const events = (item.statusHistory || []).map(h => {
        const d = new Date(h.controlPointDate);
        return {
            status: h.controlPoint,
            date: d.toLocaleDateString('el-GR'),
            time: d.toLocaleTimeString('el-GR', { hour: '2-digit', minute: '2-digit' }),
            place: h.controlPointCode || h.info || ''
        };
    });

    // Add route info
    const routeInfo = `${item.pickupDescription || ''} → ${item.destinationDescription || ''}`;
    
    addCard(num, 'acs', bt, bc, events, out, routeInfo);
}

// ═══ UI Helpers ═══
function addCard(tn, courier, badgeText, badgeClass, events, out, subtitle) {
    const d = document.createElement('div'); d.className = 'res';
    const courierTag = courier === 'acs' ? '<span class="courier-tag tag-acs">ACS</span>' : '<span class="courier-tag tag-elta">ΕΛΤΑ</span>';
    const hdClass = courier === 'acs' ? 'acs-hd' : 'elta-hd';
    
    d.innerHTML = `
        <div class="res-hd ${hdClass}">
            <span class="tn">${courierTag} ${esc(tn)}</span>
            <span class="badge ${badgeClass}">${badgeText}</span>
        </div>
        ${subtitle ? `<div style="padding:8px 20px;font:12px 'JetBrains Mono',monospace;color:var(--t3)">${esc(subtitle)}</div>` : ''}
        <table>
            <thead><tr><th>Κατάσταση</th><th>Ημ/νία</th><th>Ώρα</th><th>Πληροφορίες</th></tr></thead>
            <tbody>${events.map(v => `<tr>
                <td>${esc(v.status)}</td>
                <td>${esc(v.date)}</td>
                <td>${esc(v.time)}</td>
                <td>${esc(v.place)}</td>
            </tr>`).join('')}</tbody>
        </table>`;
    out.appendChild(d);
}

function errC(tn, courier, msg, out) {
    const courierTag = courier === 'acs' ? '<span class="courier-tag tag-acs">ACS</span>' : '<span class="courier-tag tag-elta">ΕΛΤΑ</span>';
    const siteUrl = courier === 'acs' ? 'https://www.acscourier.net/' : 'https://www.elta-courier.gr/search';
    const d = document.createElement('div'); d.className = 'res';
    d.innerHTML = `
        <div class="res-hd"><span class="tn">${courierTag} ${esc(tn)}</span><span class="badge b-err">—</span></div>
        <div class="err-msg">${esc(msg)}</div>
        <div style="display:flex;justify-content:center;padding:10px;background:rgba(0,0,0,.08);border-top:1px solid var(--brd)">
            <a href="${siteUrl}" target="_blank" style="background:0;border:1px solid var(--brd);border-radius:6px;padding:5px 14px;color:var(--t2);font:12px 'JetBrains Mono',monospace;text-decoration:none">Δοκιμή στο site →</a>
        </div>`;
    out.appendChild(d);
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showH() {
    const sec = document.getElementById('histSec'), ch = document.getElementById('chips');
    if (!hist.length) { sec.style.display = 'none'; return; }
    sec.style.display = 'block'; ch.innerHTML = '';
    hist.slice(0, 12).forEach(n => {
        const s = document.createElement('span'); s.className = 'chip'; s.textContent = n;
        s.onclick = () => { document.getElementById('inp').value = n; go(); };
        ch.appendChild(s);
    });
}
function clrH() { hist = []; try { localStorage.removeItem('gct_h'); } catch(e) {} showH(); }

document.getElementById('inp').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
});
document.getElementById('inp').focus();
</script>
</body>
</html>
